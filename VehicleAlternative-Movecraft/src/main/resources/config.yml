# VehicleAlternative Configuration
# All speeds are multipliers of the default vanilla speed
# (1.0 = vanilla speed, 2.0 = double speed, etc.)

# =====================
# Global Settings
# =====================
global:
  enabled: true
  debug: false
  per-world-overrides: {}

# =====================
# Horse Settings
# =====================
horses:
  enabled: true
  speed-multiplier: 1.5
  jump-multiplier: 1.2
  min-speed-multiplier: 1.2
  max-speed-multiplier: 2.5
  apply-to-donkeys: true
  apply-to-mules: true
  require-permission: false

# =====================
# Boat Settings
# =====================
boats:
  enabled: true
  speed:
    water-multiplier: 1.8
    ice-multiplier: 2.5
    land-multiplier: 0.8
  climbing:
    enabled: true
    allow-on-land: true
    allow-in-water: true
    max-climb-height: 2
    climb-speed: 0.5
    stamina:
      enabled: false
      max-stamina: 100
      drain-per-climb: 10
      regen-per-second: 5
  require-permission: false
  types:
    oak: true
    spruce: true
    birch: true
    jungle: true
    acacia: true
    dark_oak: true
    mangrove: true
    cherry: true
    bamboo: true

# =====================
# Minecart Settings
# =====================
minecarts:
  enabled: true
  speed-multiplier: 1.5
  max-speed-multiplier: 3.0
  powered-rail-boost: 2.0
  require-permission: false
  types:
    regular: true
    chest: true
    furnace: true
    hopper: true
    tnt: true

# =====================
# Pig Settings
# =====================
pigs:
  enabled: true
  speed-multiplier: 1.3
  require-permission: false

# =====================
# Strider Settings
# =====================
striders:
  enabled: true
  lava-speed-multiplier: 1.4
  land-speed-multiplier: 1.0
  require-permission: false

# =====================
# Camel Settings (1.20+)
# =====================
camels:
  enabled: true
  speed-multiplier: 1.3
  require-permission: false

# =====================
# Block Speed Boost Config
# =====================
# Certain surface blocks can grant a speed boost to players and vehicles
# traveling over them. Works for players on foot, boats, minecarts, horses,
# pigs, camels, and striders.
#
# Add any valid Minecraft block name (uppercase) to the list below.
# Each block uses the multiplier defined under 'multiplier'.
# Example — to add a block simply append a new line:
#   - IRON_BLOCK
#
block-speed-boost-config:
  enabled: true

  # Apply boost to players walking on foot
  apply-to-players: true

  # Apply boost to all vehicles (boats, minecarts, rideable mobs)
  apply-to-vehicles: true

  # Speed multiplier applied when on any block in the list (1.5 = 50% faster)
  multiplier: 1.5

  # Permission required to receive the boost (leave blank to apply to everyone)
  require-permission: false

  # --- Block list ---
  # Add or remove blocks freely. Use exact Minecraft material names (uppercase).
  blocks:
    - DIRT_PATH
    - POLISHED_ANDESITE
    - POLISHED_GRANITE
    - POLISHED_DIORITE
    - POLISHED_DEEPSLATE
    - SMOOTH_STONE
    - SMOOTH_QUARTZ
    - SMOOTH_SANDSTONE
    - SMOOTH_RED_SANDSTONE
    - PACKED_MUD
    - MUD_BRICKS

# =====================
# Ender Pearl Settings
# =====================
ender-pearls:
  enabled: true

  # Set to true to completely block ender pearl throws.
  # The pearl is returned to the player's inventory automatically.
  disable: false

  # Extra cooldown in SECONDS added on top of vanilla's built-in 1-second cooldown.
  # 0 = vanilla only.  Example: cooldown: 5 means players must wait 5 s between throws.
  cooldown: 0

  # Set to true to only apply these settings to players with
  # the 'vehiclealternative.enderpearl' permission.
  require-permission: false

# =====================
# Elytra Settings
# =====================
elytra:
  enabled: true

  # Horizontal speed multiplier for elytra gliding.
  # 1.0 = vanilla speed, 1.5 = 50% faster, 0.5 = 50% slower.
  # This is a soft cap — dive physics and gravity remain vanilla.
  speed-multiplier: 1.0

  # Durability drain multiplier while gliding.
  # Vanilla drains 1 point per second.
  # 2.0 = 2/s (twice as fast), 0.5 = 0.5/s (half as fast).
  durability-multiplier: 1.0

  # Set to true to prevent players from using firework rockets while gliding.
  disable-fireworks: false

  # Multiply the speed boost a firework rocket grants while gliding.
  # 1.0 = vanilla boost, 2.0 = double boost, 0.5 = half boost.
  firework-speed-multiplier: 1.0

  # Set to true to restrict these settings to players with
  # the 'vehiclealternative.elytra' permission.
  require-permission: false

# =====================
# Special Effects
# =====================
effects:
  particles:
    enabled: true
    type: "CLOUD"
    amount: 3
  sounds:
    enabled: true
    on-speed-change: true
    sound-type: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 0.5
    pitch: 1.0

# =====================
# Performance Settings
# =====================
performance:
  # How often the block-speed scheduler runs (ticks; 20 = 1 second)
  update-interval: 5
  max-vehicles-per-tick: 50

# =====================
# Messages
# =====================
messages:
  prefix: "&8[&bVehicleAlternative&8]&r "
  reload-success: "&aConfiguration reloaded successfully!"
  no-permission: "&cYou don't have permission to use this command."
  plugin-info: "&bVehicleAlternative &7v${project.version} &8- &7Vanilla-friendly vehicle modifications"
